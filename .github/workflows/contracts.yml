# TON AI Agent - Contract Tests
#
# Runs Blueprint smart contract tests on pull requests that touch contracts/
# and on every push to main. Uses the Tact compiler version pinned in
# the root package.json (via @ton/blueprint devDependency).

name: Contract Tests

on:
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
  push:
    branches: [main]

jobs:
  blueprint-test:
    name: Blueprint / Tact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Blueprint contract tests
        run: npx blueprint test
        working-directory: contracts
