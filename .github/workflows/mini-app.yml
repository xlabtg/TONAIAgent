# Telegram Mini App – Playwright E2E Tests
#
# Runs Playwright browser tests for the security UI components (simulation banner,
# live-trading modal, mainnet readiness checklist) on every PR that touches the
# mini-app frontend.  Screenshots captured during the run are uploaded as
# artifacts for visual review.

name: Mini App E2E

on:
  push:
    branches:
      - main
      - 'issue-*'
    paths:
      - 'apps/telegram-miniapp/**'
      - '.github/workflows/mini-app.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/telegram-miniapp/**'
      - '.github/workflows/mini-app.yml'

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/telegram-miniapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/telegram-miniapp/playwright-report/
          retention-days: 14

      - name: Upload baseline screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: docs/screenshots/
          retention-days: 14
